<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャットボット プレビュー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; overflow: hidden; height: 100vh; }
    .site-frame {
      position: fixed;
      inset: 0;
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <iframe
    class="site-frame"
    id="siteFrame"
    src="index.html"
  ></iframe>
  <script>
    // パスワードゲートを自動突破
    var frame = document.getElementById('siteFrame');
    frame.addEventListener('load', function() {
      try {
        frame.contentWindow.sessionStorage.setItem('auth', '1');
        var gate = frame.contentDocument.getElementById('password-gate');
        if (gate) gate.style.display = 'none';
      } catch(e) {}
    });
  </script>
</body>
</html>
